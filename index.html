<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sagar Panchal — Webflow Developer & Designer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Sagar Panchal — Webflow Developer & Designer building refined, conversion-focused marketing sites and product experiences." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter+Tight:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ─── Design tokens ─── */
  :root {
    --bg: #FAFAF7;
    --bg-2: #F2F0EA;
    --fg: #0A0A0A;
    --fg-2: #1A1A1A;
    --muted: rgba(10,10,10,0.56);
    --faint: rgba(10,10,10,0.36);
    --line: rgba(10,10,10,0.10);
    --line-soft: rgba(10,10,10,0.06);
    --soft: rgba(10,10,10,0.04);
    --card: #FFFFFF;
    --accent: #146EF5;
    --accent-soft: rgba(20,110,245,0.10);
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
    --radius: 18px;
    --radius-lg: 28px;
  }
  html[data-theme="warm"] {
    --bg: #F0EDE5; --bg-2: #E8E4D9; --fg: #18150F; --fg-2: #2A2620;
    --muted: rgba(24,21,15,0.58); --faint: rgba(24,21,15,0.36);
    --line: rgba(24,21,15,0.12); --line-soft: rgba(24,21,15,0.07);
    --soft: rgba(24,21,15,0.05); --card: #F7F4ED;
    --accent-soft: rgba(20,110,245,0.12);
  }
  html[data-theme="dark"] {
    --bg: #0B0B0B; --bg-2: #131313; --fg: #F4F2EC; --fg-2: #E6E4DE;
    --muted: rgba(244,242,236,0.62); --faint: rgba(244,242,236,0.36);
    --line: rgba(244,242,236,0.10); --line-soft: rgba(244,242,236,0.06);
    --soft: rgba(244,242,236,0.04); --card: #161616;
    --accent-soft: rgba(20,110,245,0.16);
  }
  html[data-type="tight"]   { --font-display: "Inter Tight", system-ui, sans-serif; }
  html[data-type="manrope"] { --font-display: "Manrope", system-ui, sans-serif; }

  /* ─── Reset & base ─── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); scroll-behavior: smooth; }
  body {
    font-family: var(--font-body); font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    transition: background-color .4s ease, color .4s ease;
  }
  body[data-cursor="on"] { cursor: none; }
  body[data-cursor="on"] * { cursor: none !important; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; }
  ::selection { background: var(--accent); color: #fff; }

  /* ─── Layout ─── */
  .wrap { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 48px; }
  @media (max-width: 1024px) { .wrap { padding: 0 32px; } }
  @media (max-width: 640px)  { .wrap { padding: 0 20px; } }

  /* ─── Type ─── */
  .display { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.035em; line-height: 0.94; }
  .mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  /* ─── Section ─── */
  .section { padding: 120px 0; position: relative; }
  @media (max-width: 768px) { .section { padding: 80px 0; } }
  @media (max-width: 480px) { .section { padding: 60px 0; } }
  .hair { height: 1px; background: var(--line); width: 100%; }

  /* ─── Pill ─── */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    height: 28px; padding: 0 12px;
    border: 0.5px solid var(--line); border-radius: 999px;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--fg-2); background: var(--card); backdrop-filter: blur(8px);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.45 } }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex; align-items: center; gap: 12px;
    height: 50px; padding: 0 22px; border-radius: 999px;
    font-family: var(--font-display); font-weight: 500; font-size: 14.5px; letter-spacing: -0.005em;
    transition: transform .35s cubic-bezier(.2,.7,.2,1), background-color .25s, color .25s, border-color .25s;
    border: 0.5px solid transparent; will-change: transform;
  }
  .btn-primary { background: var(--fg); color: var(--bg); }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary { background: transparent; border-color: var(--line); color: var(--fg); }
  .btn-secondary:hover { background: var(--soft); border-color: var(--fg); }
  .btn .arrow { transition: transform .35s cubic-bezier(.2,.7,.2,1); display: inline-flex; }
  .btn:hover .arrow { transform: translate(3px,-3px); }

  /* ─── Reveal on scroll ─── */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal[data-delay="1"] { transition-delay: .08s; }
  .reveal[data-delay="2"] { transition-delay: .16s; }
  .reveal[data-delay="3"] { transition-delay: .24s; }
  .reveal[data-delay="4"] { transition-delay: .32s; }

  /* ─── Custom cursor ─── */
  .cursor-dot, .cursor-ring {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 2147483645;
    border-radius: 50%; mix-blend-mode: difference; will-change: transform;
  }
  .cursor-dot { width: 6px; height: 6px; background: #fff; transform: translate(-50%,-50%); transition: width .25s, height .25s, opacity .25s; }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.5); transform: translate(-50%,-50%); transition: width .35s cubic-bezier(.2,.7,.2,1), height .35s cubic-bezier(.2,.7,.2,1), opacity .25s, background-color .25s; }
  .cursor-ring.is-hover { width: 64px; height: 64px; background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.7); }
  @media (hover: none), (pointer: coarse) {
    body[data-cursor="on"] { cursor: auto !important; }
    body[data-cursor="on"] * { cursor: auto !important; }
    .cursor-dot, .cursor-ring { display: none !important; }
  }

  /* ─── Marquee ─── */
  .marquee { display: flex; gap: 64px; white-space: nowrap; animation: marquee 40s linear infinite; }
  .marquee.reverse { animation-direction: reverse; }
  @keyframes marquee { from { transform: translateX(0) } to { transform: translateX(-50%) } }
  .marquee-row { overflow: hidden; mask-image: linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent); -webkit-mask-image: linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent); }

  /* ─── Underline link ─── */
  .ulink { position: relative; display: inline-block; }
  .ulink::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 1px; background: currentColor; transform-origin: right; transform: scaleX(1); transition: transform .5s cubic-bezier(.2,.7,.2,1); }
  .ulink:hover::after { transform-origin: left; transform: scaleX(0); animation: ulink-in .5s .25s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes ulink-in { from { transform-origin:left; transform:scaleX(0); } to { transform-origin:left; transform:scaleX(1); } }

  /* ─── Nav ─── */
  .nav {
    position: fixed; top: 16px; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: center; pointer-events: none;
  }
  .nav-inner {
    pointer-events: auto;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px 8px 18px;
    border: 0.5px solid var(--line);
    background: color-mix(in srgb, var(--card) 80%, transparent);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 999px;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 8px 30px rgba(0,0,0,.06);
  }
  .nav-brand { font-family: var(--font-display); font-weight: 600; font-size: 14px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 0.5px solid var(--line); margin-right: 6px; }
  .nav-brand .glyph { width: 18px; height: 18px; border-radius: 5px; background: var(--fg); position: relative; overflow: hidden; }
  .nav-brand .glyph::after { content: ""; position: absolute; inset: 4px; border-radius: 2px; background: var(--bg); }
  .nav-links { display: flex; gap: 2px; }
  .nav-link { height: 36px; padding: 0 14px; display: inline-flex; align-items: center; font-family: var(--font-body); font-weight: 500; font-size: 13.5px; color: var(--fg-2); border-radius: 999px; transition: background-color .2s, color .2s; }
  .nav-link:hover { background: var(--soft); color: var(--fg); }
  .nav-cta { height: 36px; padding: 0 16px 0 14px; display: inline-flex; align-items: center; gap: 8px; background: var(--fg); color: var(--bg); border-radius: 999px; font-family: var(--font-display); font-weight: 500; font-size: 13px; transition: background-color .25s; }
  .nav-cta:hover { background: var(--accent); }
  .nav-cta .ndot { width: 6px; height: 6px; border-radius: 50%; background: #34D399; box-shadow: 0 0 8px #34D399; }
  /* Hamburger */
  .nav-hamburger { display: none; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 999px; background: var(--fg); border: 0; cursor: pointer; flex-direction: column; gap: 4px; padding: 0; }
  .ham-bar { display: block; width: 14px; height: 1.5px; background: var(--bg); border-radius: 99px; transition: transform .3s ease, opacity .3s ease; }
  .ham-open .ham-bar:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
  .ham-open .ham-bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .ham-open .ham-bar:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
  /* Mobile menu */
  .mobile-nav {
    position: fixed; top: 68px; left: 12px; right: 12px; z-index: 99;
    background: color-mix(in srgb, var(--card) 90%, transparent);
    border: 0.5px solid var(--line);
    border-radius: 20px; padding: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,.12);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    display: flex; flex-direction: column;
    animation: mobMenuIn .22s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes mobMenuIn { from { opacity:0; transform:translateY(-10px) scale(.97); } to { opacity:1; transform:none; } }
  .mobile-nav-link { padding: 14px 18px; font-family: var(--font-display); font-weight: 500; font-size: 19px; letter-spacing: -0.015em; color: var(--fg); border-radius: 12px; display: block; transition: background .2s; }
  .mobile-nav-link:hover { background: var(--soft); }
  .mobile-nav-hair { height: 0.5px; background: var(--line); margin: 6px 4px; }
  .mobile-nav-cta { margin: 6px 4px 4px; display: flex; }
  .mobile-nav-cta .btn { flex: 1; justify-content: center; height: 48px; }
  @media (max-width: 720px) {
    .nav-links { display: none; }
    .nav-cta { display: none; }
    .nav-hamburger { display: flex; }
  }

  /* ─── Tag chip ─── */
  .tag { display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 999px; border: 0.5px solid var(--line); font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }

  /* ─── Card ─── */
  .card { background: var(--card); border: 0.5px solid var(--line); border-radius: var(--radius); overflow: hidden; transition: transform .5s cubic-bezier(.2,.7,.2,1), border-color .3s; }
  .card:hover { border-color: var(--fg-2); }

  /* ─── Placeholder image ─── */
  .ph { position: relative; background: var(--bg-2); overflow: hidden; border-radius: 8px; }
  .ph::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg,transparent 0 14px,var(--line-soft) 14px 15px); opacity: 0.9; }
  .ph .ph-label { position: absolute; top: 12px; left: 12px; font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; background: var(--card); padding: 4px 8px; border-radius: 4px; border: 0.5px solid var(--line); }

  /* ─── Grid canvas ─── */
  .grid-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ─── Floating tags (hero bento motif) ─── */
  .float-tag { position: absolute; display: inline-flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--card); border: 0.5px solid var(--line); border-radius: 999px; font-family: var(--font-display); font-weight: 500; font-size: 13px; box-shadow: 0 8px 30px rgba(0,0,0,.04); backdrop-filter: blur(12px); animation: floaty 6s ease-in-out infinite; }
  .float-tag .fdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  @keyframes floaty { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-8px) } }
  @media (max-width: 640px) { .float-tag { display: none; } }

  /* ─── Orb ─── */
  .orb { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%,rgba(20,110,245,.45),rgba(20,110,245,.1) 40%,transparent 70%),radial-gradient(circle at 70% 70%,rgba(20,110,245,.25),transparent 50%); filter: blur(20px); animation: orb 14s ease-in-out infinite; }
  @keyframes orb { 0%,100% { transform:translate(0,0) scale(1) } 50% { transform:translate(40px,-30px) scale(1.08) } }

  /* ─── Kbd ─── */
  .kbd { display: inline-flex; align-items: center; justify-content: center; height: 22px; min-width: 22px; padding: 0 6px; border: 0.5px solid var(--line); border-radius: 5px; background: var(--card); font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); }

  /* ─── Stat ─── */
  .stat .num { font-family: var(--font-display); font-weight: 400; font-size: 56px; letter-spacing: -0.04em; line-height: 1; color: var(--fg); }
  .stat .lbl { color: var(--muted); font-size: 12px; font-family: var(--font-mono); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 8px; }
  @media (max-width: 640px) { .stat .num { font-size: 38px; } }
  @media (max-width: 380px) { .stat .num { font-size: 32px; } }

  /* ─── Rail ─── */
  .rail { position: absolute; left: 32px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: left center; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }

  /* ─── Magnetic wrapper ─── */
  .mag { display: inline-flex; }

  /* ─── Cap strip ─── */
  .cap-strip { display: flex; gap: 16px; align-items: center; }
  .cap-strip .cap { display: inline-flex; align-items: center; gap: 10px; padding: 0 16px; height: 40px; border: 0.5px solid var(--line); border-radius: 999px; background: var(--card); font-family: var(--font-display); font-size: 14px; font-weight: 500; color: var(--fg-2); }
  .cap .star { color: var(--accent); }

  /* ─── Hero foot ─── */
  .hero-foot { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; margin-top: 60px; align-items: end; }
  @media (max-width: 768px) {
    .hero-foot { grid-template-columns: 1fr !important; gap: 24px !important; }
    .hero-foot > div:last-child { justify-content: flex-start !important; }
  }

  /* ─── Hero stats row ─── */
  .hero-stats-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-top: 90px; }
  .hero-stats-inner { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  @media (max-width: 640px) { .hero-stats-inner { gap: 16px; } }

  /* ─── Section head row ─── */
  .section-head-row { display: grid; grid-template-columns: auto 1fr; gap: 56px; align-items: end; margin-bottom: 64px; }
  @media (max-width: 640px) {
    .section-head-row { grid-template-columns: 1fr !important; gap: 16px !important; margin-bottom: 40px !important; }
  }

  /* ─── Work row ─── */
  .work-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 32px; align-items: center; padding: 28px 8px; border-bottom: 0.5px solid var(--line); cursor: default; position: relative; transition: padding .35s ease; }
  .work-row:hover { padding-left: 24px; }
  .work-row .preview { position: absolute; right: 12%; top: 50%; width: 280px; height: 180px; transform: translate(0,-50%) scale(.96); opacity: 0; pointer-events: none; border-radius: 10px; box-shadow: 0 30px 80px rgba(0,0,0,.18); transition: opacity .35s, transform .35s; z-index: 3; }
  .work-row:hover .preview { opacity: 1; transform: translate(0,-50%) scale(1); }
  @media (max-width: 768px) {
    .work-row { grid-template-columns: 1fr; gap: 10px; padding: 20px 0; }
    .work-row .preview { display: none; }
    .work-row > .mono:not(:first-child) { display: none; }
  }

  /* ─── Mosaic ─── */
  .mosaic { display: grid; grid-template-columns: repeat(12,1fr); gap: 20px; }
  .mosaic .m { position: relative; overflow: hidden; border-radius: var(--radius); border: 0.5px solid var(--line); background: var(--card); }
  .mosaic .m .img { position: relative; overflow: hidden; }
  .mosaic .m .img::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg,transparent 60%,rgba(0,0,0,.25)); opacity: 0; transition: opacity .4s; }
  .mosaic .m:hover .img::after { opacity: .7; }
  .mosaic .m .img img, .mosaic .m .img .ph { width: 100%; height: 100%; display: block; transition: transform 1.2s cubic-bezier(.2,.7,.2,1); }
  .mosaic .m:hover .img .ph { transform: scale(1.04); }
  .mosaic .m .meta { padding: 22px 22px 24px; display: flex; flex-direction: column; gap: 14px; }
  .mosaic .m .meta .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .mosaic .m h3 { margin: 0; font-family: var(--font-display); font-weight: 500; font-size: 22px; letter-spacing: -0.02em; line-height: 1.1; }
  @media (max-width: 768px) {
    .mosaic { grid-template-columns: 1fr; gap: 12px; }
    .mosaic .m { grid-column: 1 !important; }
  }

  /* ─── Stacked layout ─── */
  .stacked .m { grid-column: span 12 !important; display: grid; grid-template-columns: 1.1fr 1fr; gap: 0; }
  .stacked .m .img { grid-row: 1; }
  .stacked .m .meta { padding: 36px; align-self: center; gap: 18px; }
  .stacked .m:nth-child(even) .img { order: 2; }
  @media (max-width: 880px) { .stacked .m { grid-template-columns: 1fr; } }
  @media (max-width: 640px) {
    .stacked .m .img { order: 0 !important; }
    .stacked .m .meta { padding: 20px !important; }
    .stacked .m h3 { font-size: 24px !important; }
  }

  /* ─── Bento ─── */
  .bento { display: grid; grid-template-columns: repeat(12,1fr); grid-auto-rows: minmax(120px,auto); gap: 16px; }
  .bento .b { background: var(--card); border: 0.5px solid var(--line); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; transition: border-color .3s, transform .5s; }
  .bento .b:hover { border-color: var(--fg-2); }
  .bento h4 { margin: 0; font-family: var(--font-display); font-weight: 500; font-size: 18px; letter-spacing: -0.015em; }
  .bento p { margin: 0; color: var(--muted); font-size: 14.5px; line-height: 1.55; }
  @media (max-width: 880px) {
    .bento { grid-template-columns: 1fr 1fr; gap: 12px; }
    .bento .b { grid-column: span 1 !important; grid-row: span 1 !important; }
  }
  @media (max-width: 560px) {
    .bento { grid-template-columns: 1fr; gap: 10px; }
    .bento .b { grid-column: 1 !important; }
  }

  /* ─── Counter inner grid ─── */
  .counter-inner { display: grid; grid-template-columns: repeat(3,1fr); height: 100%; }
  @media (max-width: 480px) {
    .counter-inner { grid-template-columns: 1fr 1fr; }
    .counter-inner > div:nth-child(3) { border-left: 0.5px solid var(--line) !important; border-top: 0.5px solid var(--line); }
    .counter-inner > div:nth-child(even) { border-left: 0.5px solid var(--line) !important; }
  }

  /* ─── Services ─── */
  .svc-row { display: grid; grid-template-columns: 56px 1fr 1.4fr auto; gap: 36px; padding: 36px 8px; border-top: 0.5px solid var(--line); align-items: start; transition: padding .35s, background-color .35s; }
  .svc-row:last-child { border-bottom: 0.5px solid var(--line); }
  .svc-row:hover { padding-left: 24px; }
  .svc-num { font-family: var(--font-mono); font-size: 12px; color: var(--muted); padding-top: 6px; }
  .svc-title { font-family: var(--font-display); font-weight: 500; font-size: 28px; letter-spacing: -0.025em; line-height: 1.05; }
  .svc-desc { color: var(--muted); font-size: 15px; line-height: 1.6; max-width: 520px; margin: 0; }
  .svc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  @media (max-width: 880px) { .svc-row { grid-template-columns: 1fr; gap: 14px; } }

    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY, startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = ev => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome="" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}
function TweakSection({ label, children }) { return <><div className="twk-sect">{label}</div>{children}</>; }
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakSlider({ label, value, min=0, max=100, step=1, unit='', onChange }) {
  return <TweakRow label={label} value={`${value}${unit}`}><input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} /></TweakRow>;
}
function TweakToggle({ label, value, onChange }) {
  return <div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value?'1':'0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i/></button></div>;
}
function TweakSelect({ label, value, options, onChange }) {
  return <TweakRow label={label}><select className="twk-field" value={value} onChange={e => onChange(e.target.value)}>{options.map(o => { const v = typeof o==='object'?o.value:o; const l = typeof o==='object'?o.label:o; return <option key={v} value={v}>{l}</option>; })}</select></TweakRow>;
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value); valueRef.current = value;
  const labelLen = o => String(typeof o==='object'?o.label:o).length;
  const maxLen = options.reduce((m,o) => Math.max(m,labelLen(o)),0);
  const fitsAsSegments = maxLen <= ({2:16,3:10}[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = s => { const m = options.find(o => String(typeof o==='object'?o.value:o)===s); return m===undefined?s:typeof m==='object'?m.value:m; };
    return <TweakSelect label={label} value={value} options={options} onChange={s => onChange(resolve(s))} />;
  }
  const opts = options.map(o => typeof o==='object'?o:{value:o,label:o});
  const idx = Math.max(0, opts.findIndex(o => o.value===value));
  const n = opts.length;
  const segAt = clientX => { const r = trackRef.current.getBoundingClientRect(); const inner = r.width-4; const i = Math.floor(((clientX-r.left-2)/inner)*n); return opts[Math.max(0,Math.min(n-1,i))].value; };
  const onPointerDown = e => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0!==valueRef.current) onChange(v0);
    const move = ev => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v!==valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); };
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging?'twk-seg dragging':'twk-seg'}>
        <div className="twk-seg-thumb" style={{left:`calc(2px + ${idx}*(100% - 4px)/${n})`,width:`calc((100% - 4px)/${n})`}} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value===value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function TweakButton({ label, onClick, secondary=false }) {
  return <button type="button" className={secondary?'twk-btn secondary':'twk-btn'} onClick={onClick}>{label}</button>;
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakButton });

<script type="text/babel">
const { useEffect, useRef, useState } = React;

function GridCanvas() {
  const ref = useRef(null);
  const mouse = useRef({ x: -9999, y: -9999 });
  const targets = useRef({ x: 0, y: 0 });
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf, w, h, dpr;
    const dots = [];
    const spacing = 28, radius = 1.1, influence = 180;
    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = rect.width; h = rect.height;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + "px"; canvas.style.height = h + "px";
      ctx.scale(dpr, dpr);
      dots.length = 0;
      const cols = Math.ceil(w / spacing) + 1;
      const rows = Math.ceil(h / spacing) + 1;
      for (let i = 0; i < cols; i++)
        for (let j = 0; j < rows; j++)
          dots.push({ x: i*spacing, y: j*spacing, ox: i*spacing, oy: j*spacing });
    }
    function onMove(e) {
      const rect = canvas.parentElement.getBoundingClientRect();
      targets.current.x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      targets.current.y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    }
    function onLeave() { targets.current.x = -9999; targets.current.y = -9999; }
    function loop() {
      mouse.current.x += (targets.current.x - mouse.current.x) * 0.12;
      mouse.current.y += (targets.current.y - mouse.current.y) * 0.12;
      ctx.clearRect(0, 0, w, h);
      const mx = mouse.current.x, my = mouse.current.y;
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      const baseAlpha = isDark ? 0.18 : 0.14;
      for (let d of dots) {
        const dx = d.x - mx, dy = d.y - my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < influence) {
          const t = 1 - dist / influence;
          const push = t * 14, ang = Math.atan2(dy, dx);
          d.x += (d.ox + Math.cos(ang)*push - d.x) * 0.18;
          d.y += (d.oy + Math.sin(ang)*push - d.y) * 0.18;
          const r = radius + t * 2.2;
          ctx.fillStyle = t > 0.55
            ? `rgba(20,110,245,${0.95 * (t - 0.4)})`
            : isDark ? `rgba(244,242,236,${baseAlpha + t*0.5})` : `rgba(10,10,10,${baseAlpha + t*0.5})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
        } else {
          d.x += (d.ox - d.x) * 0.08; d.y += (d.oy - d.y) * 0.08;
          ctx.fillStyle = isDark ? `rgba(244,242,236,${baseAlpha})` : `rgba(10,10,10,${baseAlpha})`;
          ctx.beginPath(); ctx.arc(d.x, d.y, radius, 0, Math.PI*2); ctx.fill();
        }
      }
      raf = requestAnimationFrame(loop);
    }
    resize();
    window.addEventListener("resize", resize);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseleave", onLeave);
    loop();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseleave", onLeave); };
  }, []);
  return <canvas ref={ref} className="grid-canvas" aria-hidden="true" />;
}

  }, []);
  if (href) return <a ref={ref} href={href} className={className} {...rest}>{children}</a>;

}

<script type="text/babel">

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll(".reveal:not(.in)");
    if (!("IntersectionObserver" in window)) { els.forEach(e => e.classList.add("in")); return; }
    const io = new IntersectionObserver(entries => {
      entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); } });
    }, { threshold: 0.12, rootMargin: "0px 0px -10% 0px" });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  });
}

function SectionHead({ index, label, title, sub }) {
  return (
    <div className="reveal section-head-row">
      <div className="mono" style={{ display: "flex", flexDirection: "column", gap: 6, minWidth: 120 }}>
        <span>{index}</span>
        <span style={{ color: "var(--fg-2)" }}>{label}</span>

        {sub && <p style={{ margin: "20px 0 0", color: "var(--muted)", fontSize: 17, maxWidth: 620 }}>{sub}</p>}
      </div>
    </div>
  );
}

function AnimatedCounter({ to, duration = 1500 }) {
  const ref = React.useRef(null);
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    let done = false;
    const io = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting && !done) {
          done = true;
          const start = performance.now();
          const step = now => {
            const t = Math.min((now - start)/duration, 1);
            setVal(Math.round((1 - Math.pow(1-t, 3)) * to));
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }
      });
    }, { threshold: 0.5 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref}>{val}</span>;
}

    io.observe(el);
    return () => io.disconnect();
  }, [pct]);

<script type="text/babel">
const { useEffect: ue, useRef: ur, useState: us } = React;

function CustomCursor({ enabled }) {
  const dotRef = ur(null), ringRef = ur(null);
  ue(() => {
    if (!enabled) return;
    const dot = dotRef.current, ring = ringRef.current;
    let mx = -100, my = -100, dx = -100, dy = -100, rx = -100, ry = -100, raf;
    function tick() {
      dx += (mx-dx)*0.6; dy += (my-dy)*0.6;
      rx += (mx-rx)*0.18; ry += (my-ry)*0.18;
      if (dot) dot.style.transform = `translate(${dx}px,${dy}px) translate(-50%,-50%)`;
      if (ring) ring.style.transform = `translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      raf = requestAnimationFrame(tick);
    }
    function onMove(e) { mx = e.clientX; my = e.clientY; }
    function onOver(e) {
      const interactive = e.target.closest('a,button,[data-magnetic],input,textarea,label,.tool,.m,.work-row,.b,.svc-row,.tag');
      interactive ? ring?.classList.add("is-hover") : ring?.classList.remove("is-hover");
    }
    function onDown() { if (ring) ring.style.opacity = "0.6"; }
    function onUp() { if (ring) ring.style.opacity = "1"; }
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseover", onOver);
    window.addEventListener("mousedown", onDown);
    window.addEventListener("mouseup", onUp);
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseover",onOver); window.removeEventListener("mousedown",onDown); window.removeEventListener("mouseup",onUp); };
  }, [enabled]);
  if (!enabled) return null;
  return <><div ref={ringRef} className="cursor-ring"/><div ref={dotRef} className="cursor-dot"/></>;
}

function Nav() {
  const [scrolled, setScrolled] = us(false);
  const [mobileOpen, setMobileOpen] = us(false);
  ue(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const links = [
    { href:"#about", label:"About" },
    { href:"#services", label:"Services" },
    { href:"#work", label:"Work" },
    { href:"#contact", label:"Contact" },
  ];
  const close = () => setMobileOpen(false);
  return (
    <>
      <nav className="nav" style={{ top: scrolled ? 12 : 18, transition:"top .3s ease" }}>
        <div className="nav-inner">
          <a href="#hero" className="nav-brand">
            <span className="glyph"/>&nbsp;Sagar Panchal
          </a>
          <div className="nav-links">
            {links.map(l => <a key={l.href} href={l.href} className="nav-link">{l.label}</a>)}
          </div>
          <a href="#contact" className="nav-cta" data-magnetic>
            <span className="ndot"/>Start a project
          </a>
          <button className="nav-hamburger" onClick={() => setMobileOpen(o => !o)} aria-label="Toggle menu">
            <span className={mobileOpen ? "ham-bar" : "ham-bar"} style={mobileOpen ? { transform:"translateY(5.5px) rotate(45deg)" } : {}} />
            <span className="ham-bar" style={mobileOpen ? { opacity:0, transform:"scaleX(0)" } : {}} />
            <span className="ham-bar" style={mobileOpen ? { transform:"translateY(-5.5px) rotate(-45deg)" } : {}} />
          </button>
        </div>
      </nav>
      {mobileOpen && (
        <div className="mobile-nav">
          {links.map(l => <a key={l.href} href={l.href} className="mobile-nav-link" onClick={close}>{l.label}</a>)}
          <div className="mobile-nav-hair" />
          <div className="mobile-nav-cta">
            <a href="#contact" className="btn btn-primary" onClick={close}>Start a project <span>↗</span></a>
          </div>
        </div>
      )}
    </>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  ue(() => { document.documentElement.setAttribute("data-theme", t.theme || "light"); }, [t.theme]);
  ue(() => { document.documentElement.setAttribute("data-type", t.typePair || "grotesque"); }, [t.typePair]);
  ue(() => { document.body.setAttribute("data-cursor", t.cursor ? "on" : "off"); }, [t.cursor]);
  useReveal();
  return (
    <>
      <CustomCursor enabled={!!t.cursor} />
      <Nav />
      <main>
        <Hero motif={t.heroMotif || "grid"} />
        <About />
        <Services />
        <Work layout={t.workLayout || "stacked"} />
        <Contact />
      </main>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Theme" value={t.theme} options={[{value:"light",label:"Light"},{value:"warm",label:"Warm"},{value:"dark",label:"Dark"}]} onChange={v => setTweak("theme",v)} />
        <TweakSelect label="Typography" value={t.typePair} options={[{value:"grotesque",label:"Space Grotesk · default"},{value:"tight",label:"Inter Tight · sharp"},{value:"manrope",label:"Manrope · soft grotesque"}]} onChange={v => setTweak("typePair",v)} />
        <TweakSection label="Hero" />
        <TweakSelect label="Motif" value={t.heroMotif} options={[{value:"grid",label:"Cursor-reactive dot grid"},{value:"bento",label:"Floating capability bento"},{value:"marquee",label:"Massive type marquee"},{value:"object",label:"Abstract gradient object"}]} onChange={v => setTweak("heroMotif",v)} />
        <TweakSection label="Work" />
        <TweakRadio label="Layout" value={t.workLayout} options={[{value:"mosaic",label:"Mosaic"},{value:"list",label:"List"},{value:"stacked",label:"Stack"}]} onChange={v => setTweak("workLayout",v)} />
        <TweakSection label="Interaction" />
        <TweakToggle label="Custom cursor" value={t.cursor} onChange={v => setTweak("cursor",v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
